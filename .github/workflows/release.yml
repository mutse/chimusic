name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.41.4

jobs:
  android:
    name: Package Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          keystore_path="$RUNNER_TEMP/chimusic-upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Prepare Android release assets
        run: |
          mkdir -p dist/android
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/android/chimusic-${GITHUB_REF_NAME}-android-release.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "dist/android/chimusic-${GITHUB_REF_NAME}-android-release.aab"

      - name: Upload Android release assets
        uses: actions/upload-artifact@v4
        with:
          name: chimusic-release-android
          path: dist/android/*
          retention-days: 7

  apple:
    name: Package iOS And macOS Release
    runs-on: macos-latest
    timeout-minutes: 50

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS release app
        run: flutter build ios --release --no-codesign

      - name: Build macOS release app
        run: flutter build macos --release

      - name: Prepare Apple release assets
        run: |
          mkdir -p dist/apple
          ditto -c -k --sequesterRsrc --keepParent \
            build/ios/iphoneos/Runner.app \
            "dist/apple/chimusic-${GITHUB_REF_NAME}-ios-runner-app.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/chimusic.app \
            "dist/apple/chimusic-${GITHUB_REF_NAME}-macos-app.zip"
          hdiutil create \
            -volname "ChiMusic" \
            -srcfolder build/macos/Build/Products/Release/chimusic.app \
            -ov \
            -format UDZO \
            "dist/apple/chimusic-${GITHUB_REF_NAME}-macos.dmg"

      - name: Upload Apple release assets
        uses: actions/upload-artifact@v4
        with:
          name: chimusic-release-apple
          path: dist/apple/*
          retention-days: 7

  publish:
    name: Publish GitHub Release Assets
    needs:
      - android
      - apple
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: chimusic-release-*
          merge-multiple: true
          path: release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
